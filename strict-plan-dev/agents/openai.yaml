interface:
  display_name: "严格按计划开发"
  short_description: "先对齐需求、计划和统一编码规范，再开发测试并回填"
  default_prompt: "严格按四步执行：先定位并理解需求文档和开发计划，识别可复用实现、风格锚点以及开发计划中的统一编码规范，输出当前开发情况、疑问和风险；再列出待确认开发任务，明确复用方案、一致性约束和适用规范，必要时先更新计划；用户确认后再开发和测试，优先复用现有工具类、公共组件和统一响应封装，并遵守计划中的统一编码规范；最后将计划中的任务状态、完成情况、代码落点、验证结果和规范执行情况回填。输出优先使用固定模板。"
